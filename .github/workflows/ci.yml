name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: npm run lint -w apps/api || true

      - name: Run API Unit Tests
        run: npm test -w apps/api -- --passWithNoTests
        env:
          MONGODB_URI: mongodb://localhost:27017/foodstore_test

      - name: Build Web
        run: npm run build -w apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm exec -w apps/web -- playwright install --with-deps chromium

      - name: Build API
        run: npm run build:api

      - name: Start API server
        run: node apps/api/dist/main &
        env:
          MONGODB_URI: mongodb://localhost:27017/foodstore_test
          JWT_SECRET: test-secret-key
          PORT: 4000

      - name: Wait for API
        run: npx wait-on http://localhost:4000/api/docs -t 60000

      - name: Seed test data
        run: npm run seed -w apps/api
        env:
          MONGODB_URI: mongodb://localhost:27017/foodstore_test

      - name: Start Web server
        run: npm run dev:web &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api

      - name: Wait for Web
        run: npx wait-on http://localhost:3000 -t 30000

      - name: Run Playwright tests
        run: cd apps/web && npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint-and-test, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: '--prod'
