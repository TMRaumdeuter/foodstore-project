version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: foodstore-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: foodstore

  redis:
    image: redis:7-alpine
    container_name: foodstore-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: foodstore-api
    ports:
      - '4000:4000'
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/foodstore
      - JWT_SECRET=foodstore-super-secret-key-change-in-production
      - PORT=4000
    depends_on:
      - mongodb
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: foodstore-web
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: foodstore-admin
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  mongo-data:
  redis-data:
